name: Bot Laporan IHSG Harian

on:
  schedule:
    # Berjalan setiap Senin-Jumat jam 16:15 WIB (09:15 UTC)
    - cron: '15 9 * * 1-5' 
  workflow_dispatch: # Memungkinkan Anda menjalankan bot secara manual

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kode
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install yfinance pandas requests

      - name: Jalankan Skrip Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
